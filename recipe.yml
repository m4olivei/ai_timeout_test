name: 'AI Timeout Reproducer'
description: 'Stands up a barebones AI Assistant + DeepChat chatbot block whose system prompt deterministically forces a >70 second LLM response. Designed to reproduce Pantheon Fastly 59s between-bytes timeouts in pure form, decoupled from any application-specific AI feature.'
type: 'Testing'

install:
  - key
  - ai
  - ai_chatbot
  - ai_assistant_api
  - ai_provider_amazeeio
  - block

input:
  amazee_api_key:
    data_type: string
    description: 'Your amazee.ai API key. Sign up at https://www.amazee.io/ if you do not already have one. Stored in plaintext via the key module config provider — fine for a disposable test environment, not appropriate for production.'
    constraints:
      NotBlank: ~
    default:
      source: value
      value: ''
    prompt:
      method: ask
      arguments:
        question: 'amazee.ai API key'
  amazee_llm_host:
    data_type: string
    description: 'amazee.ai LLM host endpoint for your tenant (e.g. https://llm.us103.amazee.ai for US-103, https://llm.eu101.amazee.ai for EU-101).'
    default:
      source: value
      value: 'https://llm.us103.amazee.ai'
    prompt:
      method: ask
      arguments:
        question: 'amazee.ai LLM host'

config:
  # The key, assistant, and block configs ship in the recipe's config/ dir
  # and are imported verbatim. Inputs are wired through actions below.
  import:
    key:
      - key.key.ai_timeout_test_amazee
    ai_assistant_api:
      - ai_assistant_api.ai_assistant.ai_timeout_test
    block:
      - block.block.ai_timeout_test
  actions:
    # Inject the user-supplied API key into the imported key entity.
    key.key.ai_timeout_test_amazee:
      simpleConfigUpdate:
        key_provider_settings.key_value: ${amazee_api_key}
    # Point the Amazee provider at the user's tenant and key.
    ai_provider_amazeeio.settings:
      simpleConfigUpdate:
        api_key: ai_timeout_test_amazee
        host: ${amazee_llm_host}
        amazee_host: 'https://api.amazee.ai'
    # Bump the AI module's HTTP request timeout so the inner Guzzle call
    # outlasts the LLM generation. 115 < PHP-FPM's typical 120s so we
    # don't risk PHP terminating before Guzzle returns.
    ai.settings:
      simpleConfigUpdate:
        request_timeout: 115
